name: Release

# Changesets flow: a push to main with pending changesets opens a "Version
# Packages" PR. Merging that PR (which deletes the changesets) triggers this
# workflow again and publishes vcskill to npm. The private monorepo root is
# skipped automatically — only the public `vcskill` package is published.
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the Version Packages PR + tags
  pull-requests: write # open/update the Version Packages PR
  id-token: write # npm provenance via OIDC

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs — this job holds id-token: write + NPM_TOKEN,
      # so a hijacked mutable tag could exfiltrate the npm token. Comments mark the
      # human-readable version each SHA corresponds to.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "18"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `publish` runs `pnpm run release` which gates on `verify-tarball` before
      # `changeset publish`, so a malformed tarball (missing kit/LICENSE) never
      # reaches npm. Provenance comes from publishConfig.provenance + id-token.
      - name: Create Release PR or Publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version-packages
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
